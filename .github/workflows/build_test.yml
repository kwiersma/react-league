name: Build and Test React Application

on: [push]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          version: '0.1.16'
          run-install: false
      - run: npm ci
      - run: npm run ci-build
      - run: npm run ci-test
